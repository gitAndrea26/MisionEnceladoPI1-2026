<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gantt Interactivo - Misión Encelado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
        .gantt-target { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h2>📊 Gestión de Misión: Proyecto Integrador 1</h2>
    
    <div class="controls">
        <input type="text" id="task-name" placeholder="Nombre de la tarea">
        <input type="date" id="task-start" value="2026-03-01">
        <input type="date" id="task-end" value="2026-03-07">
        <select id="task-priority">
            <option value="important">Normal (Azul)</option>
            <option value="critical">Crítica (Rojo)</option>
        </select>
        <button onclick="addTask()">Añadir Tarea</button>
    </div>

    <div id="gantt"></div>

    <script>
        let tasks = [
            { id: '1', name: 'Definir misión y lugar', start: '2026-03-01', end: '2026-03-07', progress: 100, custom_class: 'important' },
            { id: '2', name: 'Necesidad y Metas', start: '2026-03-08', end: '2026-03-14', progress: 50, custom_class: 'critical' },
            { id: '3', name: 'Objetivos e Hipótesis', start: '2026-03-15', end: '2026-03-21', progress: 0, custom_class: 'important' },
            { id: '4', name: 'Restricciones y CONOPS', start: '2026-03-22', end: '2026-03-31', progress: 0, custom_class: 'important' }
        ];

        let gantt = new Gantt("#gantt", tasks, {
            language: 'es',
            on_date_change: (task, start, end) => { console.log('Cambio:', task.name, start, end); },
            view_mode: 'Week'
        });

        function addTask() {
            const name = document.getElementById('task-name').value;
            const start = document.getElementById('task-start').value;
            const end = document.getElementById('task-end').value;
            const priority = document.getElementById('task-priority').value;

            if(!name) return alert("Ponle un nombre a la tarea");

            const newTask = {
                id: String(tasks.length + 1),
                name: name,
                start: start,
                end: end,
                progress: 0,
                custom_class: priority
            };

            tasks.push(newTask);
            gantt.refresh(tasks);
        }
    </script>

    <style>
        /* Colores personalizados */
        .gantt .bar-critical .bar { fill: #ff4d4d; }
        .gantt .bar-important .bar { fill: #3498db; }
    </style>
</body>
</html>
