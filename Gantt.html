<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gantt Misión Encélado - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; align-items: flex-end; }
        .grupo-input { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #444; }
        input, button { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #dc3545; }

        /* Estilo base de las barras */
        .gantt .bar-wrapper { cursor: pointer; transform: translateY(5px); }
        .gantt .grid-row { height: 55px !important; }

        /* Colores dinámicos con soporte para margen (Variable CSS --slack-perc) */
        .bar-color1 .bar { fill: var(--color-principal, #2ecc71) !important; }
        .bar-color2 .bar { fill: var(--color-principal, #ff9ff3) !important; }
        .bar-color3 .bar { fill: var(--color-principal, #a29bfe) !important; }
        .bar-color4 .bar { fill: var(--color-principal, #81ecec) !important; }
        .bar-color5 .bar { fill: var(--color-principal, #ffbe76) !important; }
        .bar-color6 .bar { fill: var(--color-principal, #d4a373) !important; }

        /* El truco del degradado se aplica mediante JS directamente al rect */
    </style>
</head>
<body>

<div class="container">
    <h2>Gantt de Misión: Encélado</h2>
    
    <div class="controls">
        <div class="grupo-input">
            <label>Nombre Tarea</label>
            <input type="text" id="taskName" placeholder="Ej: CONOPS">
        </div>
        <div class="grupo-input">
            <label>Inicio</label>
            <input type="date" id="taskStart" value="2026-03-11">
        </div>
        <div class="grupo-input">
            <label>Días Trabajo</label>
            <input type="number" id="taskDuration" value="7" style="width: 70px;">
        </div>
        <div class="grupo-input">
            <label>Días Margen</label>
            <input type="number" id="taskSlack" value="2" style="width: 70px;">
        </div>
        <button onclick="addTask()">+ Añadir</button>
        <button class="btn-delete" onclick="clearAll()">Borrar Todo</button>
    </div>

    <div id="gantt"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAclFQQrTB2vZpDRm0E_4i4ugBL-LcqTXo", 
        authDomain: "gantt-pi1-2026.firebaseapp.com",
        databaseURL: "https://gantt-pi1-2026-default-rtdb.firebaseio.com",
        projectId: "gantt-pi1-2026",
        storageBucket: "gantt-pi1-2026.firebasestorage.app",
        messagingSenderId: "1042831132980",
        appId: "1:1042831132980:web:35a21138647f830837fd61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let gantt;
    let currentTasksCount = 0;

    db.ref("tasks").on("value", (snapshot) => {
        const data = snapshot.val();
        const tasks = data ? Object.keys(data).map(k => {
            return {
                id: k,
                name: data[k].name,
                start: data[k].start,
                end: data[k].end,
                progress: data[k].progress || 0,
                custom_class: data[k].priority,
                // Guardamos info extra para el renderizado
                slack_days: data[k].slack_days || 0,
                duration_days: data[k].duration_days || 1
            };
        }) : [];
    
        currentTasksCount = tasks.length;
    
        if (tasks.length === 0) {
            const marzo = [
                { name: "S1: Definir misión", start: "2026-03-01", end: "2026-03-09", duration_days: 7, slack_days: 2, priority: "color1" }
            ];
            marzo.forEach(t => db.ref("tasks").push({...t, progress: 0}));
            return;
        }
        renderGantt(tasks);
    });

    function renderGantt(tasks) {
        if (!gantt) {
            gantt = new Gantt("#gantt", tasks, {
                language: 'es',
                view_mode: 'Week',
                on_click: (task) => {
                    if(confirm(`¿Deseas eliminar la tarea: "${task.name}"?`)) {
                        db.ref("tasks/" + task.id).remove();
                    }
                },
                on_date_change: (task, start, end) => {
                    // Si se arrastra, mantenemos la proporción de margen
                    db.ref("tasks/" + task.id).update({
                        start: start.toISOString().split('T')[0],
                        end: end.toISOString().split('T')[0]
                    });
                }
            });
        } else {
            gantt.refresh(tasks);
        }
    
        setTimeout(() => {
            const colores = {
                'color1': '#2ecc71', 'color2': '#ff9ff3', 'color3': '#a29bfe',
                'color4': '#81ccec', 'color5': '#f2a146', 'color6': '#b38d68'
            };

            tasks.forEach(t => {
                const barWrapper = document.querySelector(`[data-id="${t.id}"]`);
                if (barWrapper) {
                    const rect = barWrapper.querySelector('.bar');
                    if (rect) {
                        const totalDays = t.duration_days + t.slack_days;
                        const splitPoint = (t.duration_days / totalDays) * 100;
                        const colorBase = colores[t.custom_class] || '#007bff';
                        
                        // Aplicamos un degradado lineal para mostrar el margen en la misma barra
                        rect.style.fill = `linear-gradient(90deg, ${colorBase} ${splitPoint}%, #a0a0a0 ${splitPoint}%)`;
                        // Frappe usa SVG, el fill de arriba es para CSS normal, para SVG usamos:
                        rect.setAttribute('style', `fill: url(#grad-${t.id});`);
                        
                        // Crear el gradiente SVG dinámicamente si no existe
                        let svg = document.querySelector('svg.gantt');
                        let defs = svg.querySelector('defs') || svg.insertAdjacentElement('afterbegin', document.createElementNS("http://www.w3.org/2000/svg", "defs"));
                        
                        let gradId = `grad-${t.id}`;
                        let grad = document.getElementById(gradId);
                        if(!grad) {
                            grad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
                            grad.setAttribute('id', gradId);
                            defs.appendChild(grad);
                        }
                        grad.innerHTML = `
                            <stop offset="${splitPoint}%" stop-color="${colorBase}" />
                            <stop offset="${splitPoint}%" stop-color="#a0a0a0" />
                        `;
                    }
                }
            });
        }, 100);
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const startStr = document.getElementById('taskStart').value;
        const duration = parseInt(document.getElementById('taskDuration').value);
        const slack = parseInt(document.getElementById('taskSlack').value) || 0;
    
        if(!name || !startStr || isNaN(duration)) return alert("Completá los datos principales.");
    
        const startDate = new Date(startStr + "T00:00:00");
        const endDate = new Date(startDate);
        // La duración total de la fila es Trabajo + Margen
        endDate.setDate(startDate.getDate() + duration + slack);
        
        const endStr = endDate.toISOString().split('T')[0];
        const nextColorNum = (currentTasksCount % 6) + 1;
    
        db.ref("tasks").push({
            name: name,
            start: startStr,
            end: endStr,
            duration_days: duration,
            slack_days: slack,
            priority: "color" + nextColorNum, 
            progress: 0
        });
    
        document.getElementById('taskName').value = ""; 
    }
    
    function clearAll() {
        if(confirm("¿Borrar todo?")) db.ref("tasks").remove();
    }
</script>
</body>
</html>
