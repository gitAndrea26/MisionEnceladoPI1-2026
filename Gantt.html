<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gantt Misión Encélado - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; align-items: flex-end; }
        .grupo-input { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #444; }
        input, button { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #dc3545; }
    
        /* ESTO ES LO QUE IMPORTA: Atacamos el RECT dentro de la clase */
        .bar-color1 .bar { fill: #2ecc71 !important; } /* Verde */
        .bar-color2 .bar { fill: #ff9ff3 !important; } /* Rosa */
        .bar-color3 .bar { fill: #a29bfe !important; } /* Lila */
        .bar-color4 .bar { fill: #81ecec !important; } /* Celeste */
        .bar-color5 .bar { fill: #ffbe76 !important; } /* Naranja */
        .bar-color6 .bar { fill: #d4a373 !important; } /* Marrón */
        
        /* Por si acaso, también pintamos el progreso para que no se vea raro */
        .bar-color1 .bar-progress { fill: #27ae60 !important; }
        .bar-color2 .bar-progress { fill: #f368e0 !important; }

        .gantt .bar-wrapper {
            cursor: pointer;
        }

        /* Forzamos que todas las filas tengan la misma altura */
        .gantt .grid-row {
            height: 60px !important;
        }
        
        /* Alineamos la barra para que no quede pegada al techo de su fila */
        .gantt .bar-wrapper {
            transform: translateY(5px); /* Ajustá este número si la ves muy arriba o abajo */
        }
        
        /* Espacio extra en el contenedor para que la primera no toque el borde */
        .gantt-container {
            padding-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gantt de Misión: Encélado</h2>
    
    <div class="controls">
        <div class="grupo-input">
            <label>Nombre Tarea</label>
            <input type="text" id="taskName" placeholder="Ej: CONOPS">
        </div>
        <div class="grupo-input">
            <label>Inicio</label>
            <input type="date" id="taskStart" value="2026-03-11">
        </div>
        <div class="grupo-input">
            <label>Fin</label>
            <input type="date" id="taskEnd" value="2026-03-18">
        </div>
        <button onclick="addTask()">+ Añadir</button>
        <button class="btn-delete" onclick="clearAll()">Borrar Todo</button>
    </div>

    <div id="gantt"></div>
</div>

<script>
    // 1. CONFIGURACIÓN DE FIREBASE
    // IMPORTANTE: Reemplaza estos valores con los que aparecen en la consola de Firebase - REEMPLAZADOS
    const firebaseConfig = {
        apiKey: "AIzaSyAclFQQrTB2vZpDRm0E_4i4ugBL-LcqTXo", 
        authDomain: "gantt-pi1-2026.firebaseapp.com",
        databaseURL: "https://gantt-pi1-2026-default-rtdb.firebaseio.com", // Verifica este link en tu consola
        projectId: "gantt-pi1-2026",
        storageBucket: "gantt-pi1-2026.firebasestorage.app",
        messagingSenderId: "1042831132980",
        appId: "1:1042831132980:web:35a21138647f830837fd61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let gantt;
    let currentTasksCount = 0; // Para llevar la cuenta

    db.ref("tasks").on("value", (snapshot) => {
        const data = snapshot.val();
        const tasks = data ? Object.keys(data).map(k => {
            return {
                id: k,
                name: data[k].name,
                start: data[k].start,
                end: data[k].end,
                progress: data[k].progress || 0,
                custom_class: data[k].priority // Aquí debe decir "color1", "color2", etc.
            };
        }) : [];
    
        currentTasksCount = tasks.length;
    
        if (tasks.length === 0) {
            const marzo = [
                { name: "S1: Definir misión", start: "2026-03-01", end: "2026-03-07", priority: "color1" },
                { name: "S2: Necesidad y Metas", start: "2026-03-08", end: "2026-03-14", priority: "color2" },
                { name: "S3: Objetivos e Hipótesis", start: "2026-03-15", end: "2026-03-21", priority: "color3" },
                { name: "S4: Restricciones y CONOPS", start: "2026-03-22", end: "2026-03-31", priority: "color4" }
            ];
            marzo.forEach(t => db.ref("tasks").push({...t, progress: 0}));
            return;
        }
        renderGantt(tasks);
    });

    function renderGantt(tasks) {
        if (!gantt) {
            gantt = new Gantt("#gantt", tasks, {
                language: 'es',
                view_mode: 'Week',
                padding: 0,
                // --- NUEVA FUNCIÓN: ELIMINAR AL HACER CLIC ---
                on_click: (task) => {
                    if(confirm(`¿Deseas eliminar la tarea: "${task.name}"?`)) {
                        db.ref("tasks/" + task.id).remove();
                    }
                },
                on_date_change: (task, start, end) => {
                    db.ref("tasks/" + task.id).update({
                        start: start.toISOString().split('T')[0],
                        end: end.toISOString().split('T')[0]
                    });
                },
                on_progress_change: (task, progress) => {
                    db.ref("tasks/" + task.id).update({ progress: progress });
                }
            });
        } else {
            gantt.refresh(tasks);
        }
    
        // Mantener el parche de colores que ya funciona
        setTimeout(() => {
            const colores = {
                'color1': '#2ecc71', 'color2': '#ff9ff3', 'color3': '#a29bfe',
                'color4': '#81ccec', 'color5': '#f2a146', 'color6': '#b38d68'
            };
            tasks.forEach(t => {
                const barWrapper = document.querySelector(`[data-id="${t.id}"]`);
                if (barWrapper) {
                    const rect = barWrapper.querySelector('.bar');
                    if (rect && colores[t.custom_class]) {
                        rect.style.fill = colores[t.custom_class];
                    }
                }
            });
        }, 100);
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const start = document.getElementById('taskStart').value;
        const end = document.getElementById('taskEnd').value;
    
        if(!name || !start || !end) return alert("Por favor, completá todos los campos.");
    
        // El color se elige solo según cuántas tareas hay
        const nextColorNum = (currentTasksCount % 6) + 1;
        
        db.ref("tasks").push({
            name: name,
            start: start,
            end: end,
            priority: "color" + nextColorNum, 
            progress: 0
        });
    
        document.getElementById('taskName').value = ""; // Limpiamos el texto
    }
    function clearAll() {
        if(confirm("¿Borrar todo?")) db.ref("tasks").remove();
    }
</script>
</body>
</html>
