<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gantt Misión Encélado - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; align-items: flex-end; }
        .grupo-input { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #444; }
        input, button { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #dc3545; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 10px; width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .modal-actions { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }

        .gantt .bar-wrapper { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gantt de Misión: Encélado</h2>
    
    <div class="controls">
        <div class="grupo-input">
            <label>Nombre Tarea</label>
            <input type="text" id="taskName" placeholder="Ej: CONOPS">
        </div>
        <div class="grupo-input">
            <label>Inicio</label>
            <input type="date" id="taskStart" value="2026-03-18">
        </div>
        <div class="grupo-input">
            <label>Días Trabajo</label>
            <input type="number" id="taskDuration" value="7" style="width: 70px;">
        </div>
        <div class="grupo-input">
            <label>Días Margen</label>
            <input type="number" id="taskSlack" value="2" style="width: 70px;">
        </div>
        <button onclick="addTask()">+ Añadir</button>
        <button class="btn-delete" onclick="clearAll()">Borrar Todo</button>
    </div>

    <div id="gantt"></div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Editar Tarea</h3>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="moveTask(-1)" style="flex:1; background:#6c757d;">↑ Subir</button>
            <button onclick="moveTask(1)" style="flex:1; background:#6c757d;">↓ Bajar</button>
        </div>
        <hr style="width:100%">

        <input type="hidden" id="editId">
        <div class="grupo-input">
            <label>Nombre</label>
            <input type="text" id="editName">
        </div>
        <div class="grupo-input">
            <label>Días Trabajo</label>
            <input type="number" id="editDuration">
        </div>
        <div class="grupo-input">
            <label>Días Margen</label>
            <input type="number" id="editSlack">
        </div>
        <div class="modal-actions">
            <button onclick="saveEdit()">Guardar</button>
            <button class="btn-delete" onclick="deleteTask()">Eliminar</button>
            <button style="background: #6c757d;" onclick="closeModal()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAclFQQrTB2vZpDRm0E_4i4ugBL-LcqTXo", 
        authDomain: "gantt-pi1-2026.firebaseapp.com",
        databaseURL: "https://gantt-pi1-2026-default-rtdb.firebaseio.com",
        projectId: "gantt-pi1-2026",
        storageBucket: "gantt-pi1-2026.firebasestorage.app",
        messagingSenderId: "1042831132980",
        appId: "1:1042831132980:web:35a21138647f830837fd61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let gantt;
    let allTasksData = {}; 

    db.ref("tasks").on("value", (snapshot) => {
        const data = snapshot.val() || {};
        allTasksData = data;
        
        const tasks = Object.keys(data).map(k => ({
            id: k,
            name: data[k].name,
            start: data[k].start,
            end: data[k].end,
            progress: data[k].progress || 0,
            custom_class: data[k].priority,
            order: data[k].order || 0,
            duration_days: data[k].duration_days || 1,
            slack_days: data[k].slack_days || 0
        })).sort((a, b) => a.order - b.order);
    
        renderGantt(tasks);
    });

    function renderGantt(tasks) {
        if (tasks.length === 0) {
            document.getElementById("gantt").innerHTML = "No hay tareas.";
            return;
        }
        if (!gantt) {
            gantt = new Gantt("#gantt", tasks, {
                language: 'es',
                view_mode: 'Week',
                on_click: (task) => openModal(task),
                on_date_change: (task, start, end) => {
                    db.ref("tasks/" + task.id).update({
                        start: start.toISOString().split('T')[0],
                        end: end.toISOString().split('T')[0]
                    });
                }
            });
        } else {
            gantt.refresh(tasks);
        }
        applyCustomStyles(tasks);
    }

    function applyCustomStyles(tasks) {
        setTimeout(() => {
            const colores = { 'color1': '#2ecc71', 'color2': '#ff9ff3', 'color3': '#a29bfe', 'color4': '#81ccec', 'color5': '#f2a146', 'color6': '#b38d68' };
            tasks.forEach(t => {
                const barWrapper = document.querySelector(`[data-id="${t.id}"]`);
                if (barWrapper) {
                    const rect = barWrapper.querySelector('.bar');
                    if (rect) {
                        const splitPoint = (t.duration_days / (t.duration_days + t.slack_days)) * 100;
                        const colorBase = colores[t.custom_class] || '#007bff';
                        rect.setAttribute('style', `fill: url(#grad-${t.id});`);
                        let svg = document.querySelector('svg.gantt');
                        let defs = svg.querySelector('defs') || svg.insertAdjacentElement('afterbegin', document.createElementNS("http://www.w3.org/2000/svg", "defs"));
                        let grad = document.getElementById(`grad-${t.id}`) || document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
                        grad.setAttribute('id', `grad-${t.id}`);
                        defs.appendChild(grad);
                        grad.innerHTML = `<stop offset="${splitPoint}%" stop-color="${colorBase}" /><stop offset="${splitPoint}%" stop-color="#a0a0a0" />`;
                    }
                }
            });
        }, 100);
    }

    function openModal(task) {
        const original = allTasksData[task.id];
        document.getElementById('editId').value = task.id;
        document.getElementById('editName').value = original.name;
        document.getElementById('editDuration').value = original.duration_days;
        document.getElementById('editSlack').value = original.slack_days || 0;
        document.getElementById('editModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function moveTask(direction) {
        const id = document.getElementById('editId').value;
        const tasksArray = Object.keys(allTasksData).map(k => ({
            id: k, ...allTasksData[k]
        })).sort((a, b) => (a.order || 0) - (b.order || 0));
    
        const currentIndex = tasksArray.findIndex(t => t.id === id);
        const newIndex = currentIndex + direction;
    
        if (newIndex >= 0 && newIndex < tasksArray.length) {
            const currentTask = tasksArray[currentIndex];
            const siblingTask = tasksArray[newIndex];
            
            // Intercambiamos el orden
            const oldOrder = currentTask.order;
            currentTask.order = siblingTask.order;
            siblingTask.order = oldOrder;
    
            // REASIGNAR COLORES según el nuevo orden de todo el array
            const updates = {};
            tasksArray.sort((a, b) => a.order - b.order).forEach((t, index) => {
                const nextColor = "color" + ((index % 6) + 1);
                updates[`/tasks/${t.id}/order`] = t.order;
                updates[`/tasks/${t.id}/priority`] = nextColor; // Aquí refrescamos el color
            });
    
            await db.ref().update(updates);
        }
    }

    function saveEdit() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('editName').value;
        const duration = parseInt(document.getElementById('editDuration').value);
        const slack = parseInt(document.getElementById('editSlack').value) || 0;
        const original = allTasksData[id];

        const startDate = new Date(original.start + "T00:00:00");
        const endDate = new Date(startDate);
        endDate.setDate(startDate.getDate() + duration + slack);

        db.ref("tasks/" + id).update({
            name: name, duration_days: duration, slack_days: slack,
            end: endDate.toISOString().split('T')[0]
        });
        closeModal();
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const startStr = document.getElementById('taskStart').value;
        const duration = parseInt(document.getElementById('taskDuration').value);
        const slack = parseInt(document.getElementById('taskSlack').value) || 0;
    
        // Validación básica para evitar datos vacíos
        if (!name || !startStr || isNaN(duration)) {
            return alert("Por favor, completá todos los campos técnicos.");
        }
    
        const startDate = new Date(startStr + "T00:00:00");
        const endDate = new Date(startDate);
        endDate.setDate(startDate.getDate() + duration + slack);
        
        // 1. Calculamos cuántas tareas hay para asignar el 'order' al final
        const currentTasksArray = Object.values(allTasksData || {});
        const totalTasks = currentTasksArray.length;
        
        // 2. Definimos el color según la posición (del 1 al 6)
        const nextColorNum = (totalTasks % 6) + 1;
        const priority = "color" + nextColorNum;
    
        // 3. Guardamos en Firebase con la estructura completa
        db.ref("tasks").push({ 
            name: name, 
            start: startStr, 
            end: endDate.toISOString().split('T')[0], 
            duration_days: duration, 
            slack_days: slack, 
            priority: priority, 
            progress: 0, 
            order: totalTasks // La nueva tarea va al final
        }).then(() => {
            // Limpiamos los campos después de agregar con éxito
            document.getElementById('taskName').value = "";
            console.log("Tarea de la misión agregada correctamente.");
        }).catch((error) => {
            console.error("Error al guardar en Firebase:", error);
        });
    }

    function deleteTask() {
        const id = document.getElementById('editId').value;
        if(confirm("¿Eliminar?")) { db.ref("tasks/" + id).remove(); closeModal(); }
    }

    function clearAll() { if(confirm("¿Borrar todo?")) db.ref("tasks").remove(); }

    window.onclick = function(event) {
        if (event.target == document.getElementById('editModal')) closeModal();
    }
</script>
</body>
</html>
