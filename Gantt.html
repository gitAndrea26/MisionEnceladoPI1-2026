<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Misión Encélado - PI1</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #eceff1; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #263238; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #cfd8dc; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .gantt-target { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        
        /* Colores de prioridad */
        .gantt .bar-critical .bar { fill: #e53935; } /* Rojo */
        .gantt .bar-important .bar { fill: #1e88e5; } /* Azul */
        .gantt .bar-margin .bar { fill: #fdd835; } /* Amarillo para márgenes */
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Cronograma: Exploración Subsuperficial de Encélado</h2>
    
    <div class="controls">
        <input type="text" id="task-name" placeholder="Nombre de la tarea (ej. CONOPS)">
        <input type="date" id="task-start" value="2026-03-01">
        <input type="date" id="task-end" value="2026-03-07">
        <select id="task-priority">
            <option value="important">Prioridad Normal</option>
            <option value="critical">CRÍTICA (Rojo)</option>
            <option value="margin">Margen de Tiempo</option>
        </select>
        <button onclick="addTask()">Añadir al Plan</button>
    </div>

    <div id="gantt"></div>
</div>

<script>
    // 1. CONFIGURACIÓN DE FIREBASE
    // IMPORTANTE: Reemplaza estos valores con los que aparecen en la consola de Firebase - REEMPLAZADOS
    const firebaseConfig = {
        apiKey: "AIzaSyAclFQQrTB2vZpDRm0E_4i4ugBL-LcqTXo", 
        authDomain: "gantt-pi1-2026.firebaseapp.com",
        databaseURL: "https://gantt-pi1-2026-default-rtdb.firebaseio.com", // Verifica este link en tu consola
        projectId: "gantt-pi1-2026",
        storageBucket: "gantt-pi1-2026.firebasestorage.app",
        messagingSenderId: "1042831132980",
        appId: "1:1042831132980:web:35a21138647f830837fd61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tasks = [];
    let gantt;

    // 2. ESCUCHAR CAMBIOS EN TIEMPO REAL
    db.ref("tasks").on("value", (snapshot) => {
        const data = snapshot.val();
        // Convertimos el objeto de Firebase en un array para el Gantt
        tasks = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
        
        renderGantt();
    });

    function renderGantt() {
        if (tasks.length === 0) return;

        if (!gantt) {
            gantt = new Gantt("#gantt", tasks, {
                language: 'es',
                view_mode: 'Week',
                on_date_change: (task, start, end) => {
                    updateTaskDates(task.id, start, end);
                },
                on_progress_change: (task, progress) => {
                    db.ref("tasks/" + task.id).update({ progress: progress });
                }
            });
        } else {
            gantt.refresh(tasks);
        }
    }

    // 3. FUNCIONES DE ESCRITURA
    function addTask() {
        const name = document.getElementById('task-name').value;
        if(!name) return alert("Ingresa el nombre de la tarea");

        const newTaskRef = db.ref("tasks").push(); // Crea un ID único automático
        
        newTaskRef.set({
            name: name,
            start: document.getElementById('task-start').value,
            end: document.getElementById('task-end').value,
            progress: 0,
            custom_class: document.getElementById('task-priority').value
        });

        document.getElementById('task-name').value = ""; // Limpiar input
    }

    function updateTaskDates(id, start, end) {
        const s = start.toISOString().split('T')[0];
        const e = end.toISOString().split('T')[0];
        db.ref("tasks/" + id).update({ start: s, end: e });
    }
</script>

</body>
</html>
