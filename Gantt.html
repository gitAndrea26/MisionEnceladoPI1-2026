<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gantt Misión Encélado - PI1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #eceff1; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #cfd8dc; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .gantt .bar-critical .bar { fill: #e53935; }
        .gantt .bar-important .bar { fill: #1e88e5; }
        .gantt .bar-margin .bar { fill: #fdd835; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Cronograma: Misión Encélado (PI1)</h2>
    <div class="controls">
        <input type="text" id="task-name" placeholder="Nueva tarea...">
        <input type="date" id="task-start" value="2026-03-11">
        <input type="date" id="task-end" value="2026-03-18">
        <select id="task-priority">
            <option value="important">Normal</option>
            <option value="critical">Crítica</option>
            <option value="margin">Margen</option>
        </select>
        <button onclick="addTask()">+ Añadir</button>
    </div>
    <div id="gantt"></div>
</div>

<script>
    // 1. CONFIGURACIÓN DE FIREBASE
    // IMPORTANTE: Reemplaza estos valores con los que aparecen en la consola de Firebase - REEMPLAZADOS
    const firebaseConfig = {
        apiKey: "AIzaSyAclFQQrTB2vZpDRm0E_4i4ugBL-LcqTXo", 
        authDomain: "gantt-pi1-2026.firebaseapp.com",
        databaseURL: "https://gantt-pi1-2026-default-rtdb.firebaseio.com", // Verifica este link en tu consola
        projectId: "gantt-pi1-2026",
        storageBucket: "gantt-pi1-2026.firebasestorage.app",
        messagingSenderId: "1042831132980",
        appId: "1:1042831132980:web:35a21138647f830837fd61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tasks = [];
    let gantt;

    // Tareas de Marzo para que no se pierdan
    const iniciales = [
        { id: "m1", name: "Semana 1: Definir misión y lugar", start: "2026-03-01", end: "2026-03-07", progress: 100, custom_class: "important" },
        { id: "m2", name: "Semana 2: Necesidad y Metas", start: "2026-03-08", end: "2026-03-14", progress: 50, custom_class: "critical" },
        { id: "m3", name: "Semana 3: Objetivos e Hipótesis", start: "2026-03-15", end: "2026-03-21", progress: 0, custom_class: "important" },
        { id: "m4", name: "Semana 4: Restricciones y CONOPS", start: "2026-03-22", end: "2026-03-31", progress: 0, custom_class: "important" }
    ];

    db.ref("tasks").on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            iniciales.forEach(t => db.ref("tasks/" + t.id).set(t));
            return;
        }
        tasks = Object.keys(data).map(k => ({...data[k], id: k}));
        if (!gantt) {
            gantt = new Gantt("#gantt", tasks, {
                language: 'es', view_mode: 'Week',
                on_date_change: (t, s, e) => updateDate(t.id, s, e),
                on_progress_change: (t, p) => db.ref("tasks/"+t.id).update({progress: p})
            });
        } else { gantt.refresh(tasks); }
    });

    function addTask() {
        const n = document.getElementById('task-name').value;
        if(!n) return;
        const id = "task_" + Date.now();
        db.ref("tasks/" + id).set({
            name: n, 
            start: document.getElementById('task-start').value,
            end: document.getElementById('task-end').value,
            progress: 0, 
            custom_class: document.getElementById('task-priority').value
        });
    }

    function updateDate(id, s, e) {
        db.ref("tasks/" + id).update({
            start: s.toISOString().split('T')[0],
            end: e.toISOString().split('T')[0]
        });
    }
</script>
</body>
</html>
